version: "3.9"

services:
  db:
    image: postgres:15
    restart: always
    env_file:
      - ./src/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./src/backend
    restart: always
    depends_on:
      - db
    env_file:
      - ./src/.env
    ports:
      - "8000:8000"

  frontend:
    build: ./src/frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data: