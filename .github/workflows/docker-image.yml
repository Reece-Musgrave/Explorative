name: Optional Build & Deploy

on:
  workflow_dispatch:
    inputs:
      run_build:
        description: "Run build & push images?"
        required: true
        default: "true"
      run_deploy:
        description: "Deploy to EC2?"
        required: true
        default: "false"

jobs:
  build-and-push:
    name: Build & Push Images
    if: ${{ github.event.inputs.run_build == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Backend Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/backend:latest ./src/backend

      - name: Push Backend Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/backend:latest

      - name: Build Frontend Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/frontend:latest ./src/frontend

      - name: Push Frontend Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/frontend:latest


  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.run_deploy == 'true' }}
    needs: build-and-push
    continue-on-error: false

    steps:
      - name: Install SSH client
        run: sudo apt-get update && sudo apt-get install -y openssh-client

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy via SSH
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            cd ~/app

            echo "Pulling latest images..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            echo "Restarting containers..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            echo "Deployment complete."
          EOF